services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: finanzen
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: finanzen
    ports:
      - "5432:5432"
    volumes:
      - db_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finanzen"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_dev_data:
